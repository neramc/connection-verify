name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn -B -ntp clean package

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: connection-verify
          path: target/connection-verify-*.jar
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    # Only publish when a build of main succeeds (never for pull requests).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built jar
        uses: actions/download-artifact@v4
        with:
          name: connection-verify
          path: dist

      - name: Resolve version from jar
        id: meta
        run: |
          jar="$(ls dist/connection-verify-*.jar | head -n1)"
          file="$(basename "$jar")"
          version="${file#connection-verify-}"
          version="${version%.jar}"
          echo "jar=$jar"          >> "$GITHUB_OUTPUT"
          echo "version=$version"  >> "$GITHUB_OUTPUT"
          echo "tag=v$version"     >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          version="${{ steps.meta.outputs.version }}"
          jar="${{ steps.meta.outputs.jar }}"
          # Replace any existing release/tag for this version so the published
          # asset always matches the latest successful build of main.
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" "$jar" \
            --target "${GITHUB_SHA}" \
            --title "Connection Verify ${version}" \
            --notes "Automated release of Connection Verify \`${version}\` for Minecraft / Paper 1.21.10, built from commit ${GITHUB_SHA}." \
            --latest
