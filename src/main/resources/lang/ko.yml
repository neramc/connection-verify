# ============================================================================
#  Connection Verify  -  한국어 (ko)
#
#  메시지는 MiniMessage 형식을 사용합니다:
#    https://docs.advntr.dev/minimessage/format.html
#  <꺾쇠> 안의 자리표시자(예: <number>)는 플러그인이 채워 넣습니다.
#  실제 꺾쇠 텍스트가 필요하면 [대괄호]를 사용하세요.
# ============================================================================

# 이 언어 파일의 내부 버전입니다.
language-version: 1

# 명령어 / 업데이트 메시지 앞에 붙는 접두사입니다 (접속 알림에는 붙지 않습니다).
prefix: "<gray>[</gray><aqua>ConnectionVerify</aqua><gray>]</gray> "

# 콘솔 알림 (의도적으로 접두사가 없습니다).
console:
  join: "<green>접속 <white><name></white></green>"
  connection-number: "<aqua>연결 번호 </aqua><yellow><bold><number></bold></yellow>"
  failed: "<red>접속 실패: </red><white><name></white> <gray>(<reason>)</gray>"

command:
  no-permission: "<red>이 명령어를 사용할 권한이 없습니다.</red>"
  players-only: "<red>이 명령어는 플레이어만 사용할 수 있습니다.</red>"
  unknown-subcommand: "<red>알 수 없는 하위 명령어입니다. 사용법: /connectionverify [reload | info | version]</red>"
  cnt:
    usage: "<yellow>사용법: /cnt [number] </yellow><gray>- <length>자리 연결 번호의 로그를 저장합니다.</gray>"
    invalid-number: "<red>연결 번호는 정확히 <length>자리 숫자여야 합니다.</red>"
    not-found: "<red><number> 번호에 해당하는 연결을 찾을 수 없습니다. 발급된 적이 없거나 만료되었습니다.</red>"
    already-exists: "<red><number> 로그 파일이 이미 존재합니다. 덮어쓰려면 file.overwrite-existing 을 켜세요.</red>"
    saved: "<green>연결 로그 </green><yellow><number></yellow> <gray>[<status>, <bytes> 바이트] 저장됨 -> </gray><aqua><path></aqua>"
    write-error: "<red>연결 로그를 저장하지 못했습니다: <error></red>"
  admin:
    usage: "<yellow>Connection Verify </yellow><gray>- /connectionverify [reload | info | version]</gray>"
    reloaded: "<green>설정과 언어 파일을 다시 불러왔습니다.</green>"
    version: "<gray>Connection Verify </gray><white><version></white> <gray>(대상 <target>, API <api>)</gray>"
    info: "<gray>메모리의 기록 수: </gray><white><records></white> <gray>| 언어: </gray><white><language></white> <gray>| 로그 폴더: </gray><white><folder></white>"

update:
  available: "<yellow>새로운 버전의 Connection Verify 가 있습니다: </yellow><white><latest></white> <gray>(현재 <current>)</gray><yellow>. 다운로드: </yellow><aqua><url></aqua>"
  up-to-date: "<green>Connection Verify 가 최신 버전입니다 (<current>).</green>"
  failed: "<gray>Connection Verify 업데이트 확인에 실패했습니다: <error></gray>"
