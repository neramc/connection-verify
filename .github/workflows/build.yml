name: Build

on:
  push:
    branches: [ main, "26.x", "1.21.x" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  #  0. Resolve (and, on main, bump) the version BEFORE anything is built.
  #
  #     The version lives in pom.xml as <revision>; plugin.yml and
  #     build-info.properties derive it at build time, so this is the single
  #     source of truth. On a push to main the new version is computed from the
  #     number of changed files and committed back (with [skip ci] so the bump
  #     commit does not start another run):
  #       *   1 - 21 files  -> patch + 1
  #       *  22 - 104 files -> minor + 1, patch = 0
  #       * 105+ files OR minor would reach 10 -> major + 1, minor = patch = 0
  # --------------------------------------------------------------------------
  version:
    name: Resolve & bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve & bump
        id: bump
        env:
          GH_EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          current="$(sed -n 's/.*<revision>\(.*\)<\/revision>.*/\1/p' pom.xml | head -1)"
          [ -n "$current" ] || current="0.0.0"
          major="${current%%.*}"; rest="${current#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"

          new="$current"
          out_sha="$SHA"

          # Only bump on a real push to main.
          if [ "$GH_EVENT" = "push" ] && [ "$REF" = "refs/heads/main" ]; then
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              count="$(git diff --name-only HEAD~1..HEAD 2>/dev/null | wc -l | tr -d ' ' || echo 1)"
            else
              count="$(git diff --name-only "$BEFORE".."$SHA" | wc -l | tr -d ' ')"
            fi
            [ -n "$count" ] || count=0
            echo "Changed files in this push: $count"

            if [ "$count" -ge 105 ]; then
              major=$((major + 1)); minor=0; patch=0
            elif [ "$count" -ge 22 ]; then
              minor=$((minor + 1)); patch=0
              if [ "$minor" -ge 10 ]; then major=$((major + 1)); minor=0; patch=0; fi
            elif [ "$count" -ge 1 ]; then
              patch=$((patch + 1))
            fi
            new="${major}.${minor}.${patch}"
          fi

          echo "Version: ${current} -> ${new}"

          if [ "$new" != "$current" ]; then
            sed -i "s|<revision>[^<]*</revision>|<revision>${new}</revision>|" pom.xml
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pom.xml
            git commit -m "chore(release): bump version to ${new} [skip ci]"
            git push origin "HEAD:${REF#refs/heads/}"
            out_sha="$(git rev-parse HEAD)"
          fi

          {
            echo "version=${new}"
            echo "sha=${out_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: echo "Resolved version **${{ steps.bump.outputs.version }}**" >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  #  1. Validate the bundled resources before spending time on a compile.
  # --------------------------------------------------------------------------
  validate:
    name: Validate resources
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML and plugin.yml keys
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          ok = True
          for path in glob.glob("src/main/resources/**/*.yml", recursive=True):
              try:
                  with open(path, encoding="utf-8") as fh:
                      yaml.safe_load(fh)
                  print(f"  ok  {path}")
              except Exception as exc:
                  print(f"FAIL  {path}: {exc}")
                  ok = False
          with open("src/main/resources/plugin.yml", encoding="utf-8") as fh:
              plugin = yaml.safe_load(fh)
          for key in ("name", "version", "main", "api-version", "commands", "permissions"):
              if key not in plugin:
                  print(f"FAIL  plugin.yml missing key: {key}")
                  ok = False
          sys.exit(0 if ok else 1)
          PY

  # --------------------------------------------------------------------------
  #  2. Build every supported target from the single codebase.
  # --------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target.id }} (JDK ${{ matrix.target.java }})
    needs: [ version, validate ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { id: mc1.21, java: 21, paper: "1.21.4-R0.1-SNAPSHOT", api: "1.21", range: "1.21.4 - 1.21.x" }
          - { id: mc26,   java: 25, paper: "26.2.build.34-alpha",   api: "26.2", range: "1.21.4 - 26.x" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.target.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.target.java }}
          cache: maven

      - name: Build & verify
        run: >
          mvn -B -ntp clean verify
          -Drevision=${{ needs.version.outputs.version }}
          -Dpaper.version=${{ matrix.target.paper }}
          -Dmaven.compiler.release=${{ matrix.target.java }}
          -Dapi.version=${{ matrix.target.api }}
          -Dtarget.id=${{ matrix.target.id }}
          -Dmc.range="${{ matrix.target.range }}"

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: connection-verify-${{ matrix.target.id }}
          path: target/connection-verify-*.jar
          if-no-files-found: error

  # --------------------------------------------------------------------------
  #  2b. Build the proxy editions (Velocity "control tower").
  # --------------------------------------------------------------------------
  proxy:
    name: Build proxy editions
    needs: [ version, validate ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build proxy editions
        run: >
          mvn -B -ntp -f proxy/pom.xml clean package
          -Drevision=${{ needs.version.outputs.version }}

      # Stage both jars into one flat directory so the uploaded artifact keeps
      # them at its root (a multi-path upload would preserve each jar's
      # velocity/target and bungee/target structure, breaking the release globs).
      - name: Stage proxy jars
        run: |
          mkdir -p proxy-dist
          cp proxy/velocity/target/connection-verify-velocity-*.jar proxy-dist/
          cp proxy/bungee/target/connection-verify-bungee-*.jar proxy-dist/

      - name: Upload proxy jars
        uses: actions/upload-artifact@v4
        with:
          name: connection-verify-proxy
          path: proxy-dist/*.jar
          if-no-files-found: error

  # --------------------------------------------------------------------------
  #  2c. Build the Fabric mod (server + client companion) with Gradle/Loom.
  # --------------------------------------------------------------------------
  mod:
    name: Build Fabric mod
    needs: [ version, validate ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Build Fabric mod
        run: gradle -p mod/fabric build -Pmod_version=${{ needs.version.outputs.version }}

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: connection-verify-mod
          path: mod/fabric/build/libs/connection-verify-fabric-*.jar
          if-no-files-found: error

  # --------------------------------------------------------------------------
  #  3. Publish a release (GitHub + optionally Modrinth) when main advances.
  # --------------------------------------------------------------------------
  release:
    name: Publish release
    needs: [ version, build, proxy, mod ]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
      VERSION: ${{ needs.version.outputs.version }}
      TAG: v${{ needs.version.outputs.version }}
      TARGET_SHA: ${{ needs.version.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built jars
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Build a categorised changelog from the commits since the previous
      # release tag. Produces two files, reused by every publish target:
      #   * gh-notes.md          - GitHub release body (adds a downloads footer)
      #   * modrinth-changelog.md - the same changelog, used for both Modrinth versions
      - name: Generate release notes
        env:
          GH_REPO: neramc/connection-verify
        run: |
          set -euo pipefail
          prev="$(git tag --list 'v*' --sort=-v:refname | grep -vx "$TAG" | head -1 || true)"
          if [ -n "$prev" ] && git rev-parse -q --verify "refs/tags/$prev^{commit}" >/dev/null; then
            range="${prev}..${GITHUB_SHA}"
            compare="https://github.com/${GH_REPO}/compare/${prev}...${TAG}"
          else
            range="${GITHUB_SHA}"
            compare="https://github.com/${GH_REPO}/commits/${TAG}"
          fi
          git log --no-merges --pretty=format:'%H%x1f%s' "$range" > commits.tsv || true
          python3 - "$compare" <<'PY'
          import os, re, sys
          compare = sys.argv[1]
          version = os.environ["VERSION"]
          buckets = {"feat": "✨ Features", "fix": "🐞 Fixes", "perf": "⚡ Performance",
                     "refactor": "♻️ Refactoring", "docs": "📝 Documentation",
                     "build": "🔧 Build & CI", "ci": "🔧 Build & CI", "test": "✅ Tests",
                     "style": "🎨 Style", "chore": "🧹 Chores"}
          order = ["✨ Features", "🐞 Fixes", "⚡ Performance", "♻️ Refactoring",
                   "📝 Documentation", "🔧 Build & CI", "✅ Tests", "🎨 Style",
                   "🧹 Chores", "📌 Other"]
          groups = {k: [] for k in order}
          seen = set()
          try:
              lines = open("commits.tsv", encoding="utf-8").read().splitlines()
          except FileNotFoundError:
              lines = []
          for line in lines:
              if "\x1f" not in line:
                  continue
              sha, subj = line.split("\x1f", 1)
              subj = subj.strip()
              if not subj or subj.startswith("chore(release): bump version"):
                  continue
              if subj in seen:            # de-dupe cherry-picks across branches
                  continue
              seen.add(subj)
              m = re.match(r'^(\w+)(?:\([^)]*\))?!?:\s*(.*)$', subj)
              title, text = "📌 Other", subj
              if m and m.group(1).lower() in buckets:
                  title, text = buckets[m.group(1).lower()], (m.group(2).strip() or subj)
              groups[title].append(f"- {text} ({sha[:7]})")
          out = []
          for name in order:
              if groups[name]:
                  out.append(f"### {name}")
                  out.extend(groups[name])
                  out.append("")
          body = "\n".join(out).strip() or "- Maintenance release."
          with open("modrinth-changelog.md", "w", encoding="utf-8") as f:
              f.write(f"{body}\n\n**Full changelog:** {compare}\n")
          gh = [f"## Connection Verify {version}", "", body, "", "---", "",
                "### 📦 Downloads",
                "**Server plugin** (Paper / Purpur / Folia):",
                f"- `connection-verify-{version}-mc1.21.jar` — Minecraft 1.21.4–1.21.x, Java 21+",
                f"- `connection-verify-{version}-mc26.jar` — Minecraft 26.2, Java 25+",
                "",
                "**Proxy control tower:**",
                f"- `connection-verify-velocity-{version}.jar` — Velocity, Java 17+",
                f"- `connection-verify-bungee-{version}.jar` — BungeeCord / Waterfall, Java 17+",
                "",
                "**Server + client mod:**",
                f"- `connection-verify-fabric-{version}.jar` — Fabric, Minecraft 1.21.4 (needs Fabric API)",
                "", f"**Full changelog:** {compare}"]
          with open("gh-notes.md", "w", encoding="utf-8") as f:
              f.write("\n".join(gh) + "\n")
          print(open("gh-notes.md", encoding="utf-8").read())
          PY

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" dist/connection-verify-*.jar \
            --target "${TARGET_SHA}" \
            --title "Connection Verify ${VERSION}" \
            --notes-file gh-notes.md \
            --latest

      # Modrinth Content Rules 5.7: each version may contain only ONE primary
      # file, matching its own Minecraft/loader versions. So the two jars are
      # published as two separate versions, distinguished by a build-metadata
      # suffix on the version number. Requires two repo settings (both skipped
      # cleanly until present):
      #   * secret   MODRINTH_TOKEN       - a Modrinth PAT with "Create versions"
      #   * variable MODRINTH_PROJECT_ID  - the base62 project ID (NOT the slug)
      - name: Publish mc1.21 to Modrinth (optional)
        if: ${{ env.MODRINTH_TOKEN != '' && env.MODRINTH_PROJECT_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: dist/connection-verify-*-mc1.21.jar
          name: Connection Verify ${{ needs.version.outputs.version }} (MC 1.21.x)
          version: ${{ needs.version.outputs.version }}+mc1.21
          version-type: release
          loaders: |
            paper
            purpur
            folia
          game-versions: |
            1.21.4
            1.21.5
            1.21.6
            1.21.7
            1.21.8
            1.21.9
            1.21.10
            1.21.11
          changelog-file: modrinth-changelog.md

      - name: Publish mc26 to Modrinth (optional)
        if: ${{ env.MODRINTH_TOKEN != '' && env.MODRINTH_PROJECT_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: dist/connection-verify-*-mc26.jar
          name: Connection Verify ${{ needs.version.outputs.version }} (MC 26.x)
          version: ${{ needs.version.outputs.version }}+mc26
          version-type: release
          loaders: |
            paper
            purpur
            folia
          # Built with api-version 26.2, so Paper refuses to load it on an older
          # 26.x server (26.1.x); only advertise versions it actually runs on.
          game-versions: |
            26.2
          changelog-file: modrinth-changelog.md

      # Proxy "control tower" edition - its own Modrinth version under the
      # velocity loader (one primary file, per Content Rules 5.7).
      - name: Publish Velocity to Modrinth (optional)
        if: ${{ env.MODRINTH_TOKEN != '' && env.MODRINTH_PROJECT_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: dist/connection-verify-velocity-*.jar
          name: Connection Verify ${{ needs.version.outputs.version }} (Velocity)
          version: ${{ needs.version.outputs.version }}+velocity
          version-type: release
          loaders: |
            velocity
          game-versions: |
            1.21.4
            1.21.5
            1.21.6
            1.21.7
            1.21.8
            1.21.9
            1.21.10
            1.21.11
            26.2
          changelog-file: modrinth-changelog.md

      - name: Publish BungeeCord to Modrinth (optional)
        if: ${{ env.MODRINTH_TOKEN != '' && env.MODRINTH_PROJECT_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: dist/connection-verify-bungee-*.jar
          name: Connection Verify ${{ needs.version.outputs.version }} (BungeeCord)
          version: ${{ needs.version.outputs.version }}+bungee
          version-type: release
          loaders: |
            bungeecord
            waterfall
          game-versions: |
            1.21.4
            1.21.5
            1.21.6
            1.21.7
            1.21.8
            1.21.9
            1.21.10
            1.21.11
            26.2
          changelog-file: modrinth-changelog.md

      # Server + client mod. Built against Minecraft 1.21.4, needs Fabric API.
      - name: Publish Fabric to Modrinth (optional)
        if: ${{ env.MODRINTH_TOKEN != '' && env.MODRINTH_PROJECT_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: dist/connection-verify-fabric-*.jar
          name: Connection Verify ${{ needs.version.outputs.version }} (Fabric)
          version: ${{ needs.version.outputs.version }}+fabric
          version-type: release
          loaders: |
            fabric
          game-versions: |
            1.21.4
          dependencies: |
            fabric-api(required)
          changelog-file: modrinth-changelog.md
